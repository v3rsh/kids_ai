networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  pgdata:
  redisdata:
  # Файлы заявок конкурса «Безопасные рисунки» (§21, §33.1).
  # Именованный том вместо bind-mount: переживает docker compose down/up,
  # удаляется только при явном `docker compose down -v` или
  # `docker volume rm`. Не мешает push образа без данных и изолирован
  # от bind-mountа ./data (логи и пр.).
  attachments_volume:

services:
  # ===== PostgreSQL =====
  # Продакшн-БД конкурса; данные на named volume `pgdata` переживают
  # docker compose down/up и перезагрузку хоста.
  postgres:
    image: postgres:15-alpine
    container_name: kids_ai_db
    restart: always
    networks:
      app_network:
        ipv4_address: 172.20.0.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-kids_ai}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: ${PG_MEM_LIMIT:-1G}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis (FSM storage) =====
  redis:
    image: redis:7-alpine
    container_name: kids_ai_redis
    restart: always
    networks:
      app_network:
        ipv4_address: 172.20.0.4
    volumes:
      - redisdata:/data
    # AOF + fsync каждую секунду — данные FSM не теряются при рестарте.
    # noeviction — никогда не вытеснять FSM-ключи под давлением памяти.
    # --save "" — RDB-снимки отключены, остаётся только AOF.
    command: >-
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy noeviction
      --save ""
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-1G}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Бот =====
  bot:
    image: kids_ai_bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kids_ai_bot
    restart: always
    networks:
      app_network:
        ipv4_address: 172.20.0.2
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backup:/app/backup
      - attachments_volume:/app/data/attachments
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Moscow
      # Bot settings
      - BOT_ID=${BOT_ID}
      - CTS_URL=${CTS_URL}
      - BOT_SECRET_KEY=${BOT_SECRET_KEY}
      - ADMIN_HUID=${ADMIN_HUID}
      # Безопасные рисунки (см. .env-example и app/config.py)
      - MODERATOR_HUIDS=${MODERATOR_HUIDS}
      - JURY_HUIDS=${JURY_HUIDS}
      - MODERATION_CHAT_ID=${MODERATION_CHAT_ID}
      - ATTACHMENTS_DIR=${ATTACHMENTS_DIR:-/app/data/attachments}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - DISK_WARN_PCT=${DISK_WARN_PCT:-80}
      - DISK_BLOCK_PCT=${DISK_BLOCK_PCT:-95}
      - INTAKE_MODE_DEFAULT=${INTAKE_MODE_DEFAULT:-files}
      - TOP_N=${TOP_N:-10}
      - JURY_ROUNDS=${JURY_ROUNDS:-3}
      - JURY_ROUND_DEADLINE_HOURS=${JURY_ROUND_DEADLINE_HOURS:-48}
      - JURY_POOLS_CONFIG=${JURY_POOLS_CONFIG}
      - COMPETITION_YEAR=${COMPETITION_YEAR:-2026}
      # Server settings
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      # Database settings
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      # Redis FSM storage
      - REDIS_URL=${REDIS_URL:-redis://172.20.0.4:6379/0}
      - FSM_TTL_DAYS=${FSM_TTL_DAYS:-30}
      # Scheduler / workers
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-true}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    deploy:
      resources:
        limits:
          memory: ${BOT_MEM_LIMIT:-2G}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===== Scheduler (отдельный процесс для periodic jobs) =====
  # Раскомментировать при появлении periodic задач и переходе на multi-worker деплой:
  # 1. Создать app/scheduler.py и app/scheduler_worker.py
  # 2. Установить ENABLE_SCHEDULER=false для bot
  # 3. Установить UVICORN_WORKERS=2+ для bot
  # 4. Раскомментировать этот сервис
  #
  # scheduler:
  #   image: kids_ai_bot:latest
  #   container_name: kids_ai_scheduler
  #   restart: always
  #   networks:
  #     app_network:
  #       ipv4_address: 172.20.0.5
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./data:/app/data
  #     - ./logs:/app/logs
  #     - ./backup:/app/backup
  #     - /etc/localtime:/etc/localtime:ro
  #   environment:
  #     - TZ=Europe/Moscow
  #     - BOT_ID=${BOT_ID}
  #     - CTS_URL=${CTS_URL}
  #     - BOT_SECRET_KEY=${BOT_SECRET_KEY}
  #     - ADMIN_HUID=${ADMIN_HUID}
  #     - DB_HOST=${DB_HOST}
  #     - DB_PORT=${DB_PORT}
  #     - DB_NAME=${DB_NAME}
  #     - DB_USER=${DB_USER}
  #     - DB_PASSWORD=${DB_PASSWORD}
  #     - REDIS_URL=${REDIS_URL:-redis://172.20.0.4:6379/0}
  #     - FSM_TTL_DAYS=${FSM_TTL_DAYS:-30}
